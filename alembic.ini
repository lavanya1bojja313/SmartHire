[alembic]
# Path to migration scripts
script_location = alembic

# Template for new revision filenames
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Database URL — overridden at runtime by env.py reading DATABASE_URL from environment
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/interview_scheduler

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
