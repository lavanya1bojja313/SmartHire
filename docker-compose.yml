# docker-compose.yml — flat layout, all files in D:\HACK

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: interview_scheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DB/Redis URLs to use Docker internal hostnames
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/interview_scheduler
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      # Override DB/Redis URLs to use Docker internal hostnames
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/interview_scheduler
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./dashboard.jsx:/app/src/components/Dashboard.jsx
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
